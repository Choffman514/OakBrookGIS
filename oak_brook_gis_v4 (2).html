<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"/>
<title>Oak Brook GIS · Schilling Construction</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#0D1B2A}
:root{
  --navy:#0D1B2A;--navy2:#152333;--navy3:#1C2E3F;--slate:#253F55;
  --amber:#E8A020;--amber2:#F5C35A;
  --sold:#E84040;--avail:#22B573;--res:#D4920A;--cons:#3D8EE8;
  --muted:#6A8DA8;--cream:#E8E0D0;--bdr:rgba(255,255,255,0.09);--bdr2:rgba(255,255,255,0.15);
  --fd:'Syne',sans-serif;--fb:'DM Sans',sans-serif;
}

/* ── LAYOUT ───────────────────────────────────────── */
#shell{display:flex;flex-direction:column;width:100vw;height:100vh;height:100dvh;background:var(--navy);color:var(--cream);font-family:var(--fb);overflow:hidden}

/* ── LAYER TAB BAR ────────────────────────────────── */
#tabbar{display:flex;align-items:center;gap:4px;padding:8px 10px 6px;background:var(--navy2);border-bottom:1px solid var(--bdr);overflow-x:auto;flex-shrink:0;-webkit-overflow-scrolling:touch;scrollbar-width:none}
#tabbar::-webkit-scrollbar{display:none}
.tab{display:flex;align-items:center;gap:5px;padding:5px 11px;border-radius:20px;border:1px solid var(--bdr2);background:transparent;color:var(--muted);font-family:var(--fb);font-size:11px;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s;font-weight:500}
.tab:hover,.tab.on{background:var(--navy3);color:var(--cream);border-color:var(--bdr2)}
.tab.on{font-weight:600}
.tdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;opacity:.6}
.tab.on .tdot{opacity:1}

/* ── TOPBAR ───────────────────────────────────────── */
#topbar{display:flex;align-items:center;justify-content:space-between;padding:6px 12px;background:var(--navy2);border-bottom:1px solid var(--bdr);flex-shrink:0}
.tb-l{display:flex;flex-direction:column}
.tb-ttl{font-family:var(--fd);font-weight:700;font-size:14px;line-height:1.2}
.tb-sub{font-size:9px;color:var(--muted)}
#tb-badge{display:flex;align-items:center;gap:5px;padding:3px 9px;background:var(--navy3);border:1px solid var(--bdr2);border-radius:5px;font-size:10px;color:var(--amber2);white-space:nowrap}
.pulse{width:5px;height:5px;border-radius:50%;background:var(--avail);animation:pls 2s infinite;flex-shrink:0}
@keyframes pls{0%,100%{opacity:1}50%{opacity:.25}}

/* ── STAT ROW ─────────────────────────────────────── */
#statrow{display:flex;gap:5px;padding:6px 10px;background:var(--navy2);border-bottom:1px solid var(--bdr);overflow-x:auto;flex-shrink:0;-webkit-overflow-scrolling:touch;scrollbar-width:none}
#statrow::-webkit-scrollbar{display:none}
.chip{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;border:1px solid;white-space:nowrap;flex-shrink:0}
.cg{background:rgba(34,181,115,.12);border-color:rgba(34,181,115,.3);color:#4DD990}
.cr{background:rgba(232,64,64,.12);border-color:rgba(232,64,64,.3);color:#F07070}
.cb{background:rgba(61,142,232,.12);border-color:rgba(61,142,232,.3);color:#7DB8F5}
.ca{background:rgba(212,146,10,.12);border-color:rgba(212,146,10,.3);color:#F0B840}
.cy{background:rgba(232,160,32,.12);border-color:rgba(232,160,32,.3);color:var(--amber2)}

/* ── MAP CANVAS ───────────────────────────────────── */
#mapwrap{flex:1;position:relative;overflow:hidden;min-height:0}
#mapcanvas{position:absolute;inset:0;width:100%;height:100%;cursor:grab;touch-action:none}
#mapcanvas:active{cursor:grabbing}

/* ── MAP CONTROLS ─────────────────────────────────── */
#zoom-btns{position:absolute;top:10px;left:10px;display:flex;flex-direction:column;gap:4px;z-index:20}
.zbtn{width:36px;height:36px;background:var(--navy2);border:1px solid var(--bdr2);border-radius:7px;color:var(--cream);font-size:20px;font-weight:300;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:var(--fd);line-height:1;transition:all .15s;-webkit-user-select:none;user-select:none;touch-action:manipulation}
.zbtn:hover,.zbtn:active{background:var(--slate)}
#legend{position:absolute;bottom:10px;left:10px;background:rgba(10,20,32,.93);border:1px solid rgba(255,255,255,.13);border-radius:7px;padding:7px 10px;z-index:20;pointer-events:none}
.leg-t{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:5px}
.leg-r{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--cream);margin-bottom:2px}
.leg-d{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* ── DETAIL PANEL (bottom sheet on mobile) ────────── */
#panel{
  flex-shrink:0;
  background:var(--navy2);
  border-top:2px solid var(--amber);
  display:flex;flex-direction:column;
  height:0;overflow:hidden;
  transition:height .28s cubic-bezier(.4,0,.2,1);
}
#panel.open{height:310px}
#ph{padding:10px 13px 8px;border-bottom:1px solid var(--bdr);display:flex;justify-content:space-between;align-items:flex-start;flex-shrink:0}
#ph-lot{font-family:var(--fd);font-weight:700;font-size:13px;line-height:1.3;color:var(--cream)}
#ph-addr{font-size:10px;color:var(--muted);margin-top:2px;line-height:1.4}
#ph-x{width:26px;height:26px;border-radius:5px;border:1px solid var(--bdr2);background:var(--navy3);color:var(--muted);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.panel-scroll{flex:1;overflow-y:auto;display:flex;gap:0;min-height:0;-webkit-overflow-scrolling:touch}
#pb{flex:1;padding:10px 13px;min-width:0;overflow-y:auto;-webkit-overflow-scrolling:touch}
#pa{flex-shrink:0;width:210px;min-width:210px;padding:8px 13px 12px;border-left:1px solid var(--bdr);overflow-y:auto;-webkit-overflow-scrolling:touch}
.sec{margin-bottom:11px}
.sec-t{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);padding-bottom:5px;margin-bottom:4px;border-bottom:1px solid var(--bdr)}
.kv{display:flex;justify-content:space-between;align-items:baseline;padding:2px 0;font-size:11px;gap:4px}
.kv span:first-child{color:var(--muted);flex-shrink:0}
.kv span:last-child{font-weight:500;color:var(--cream);text-align:right;line-height:1.3}
.kv-g span:last-child{color:#4DD990}
.pill{display:inline-block;padding:1px 6px;border-radius:12px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.ps{background:rgba(232,64,64,.2);color:#F07070;border:1px solid rgba(232,64,64,.3)}
.pa2{background:rgba(34,181,115,.2);color:#4DD990;border:1px solid rgba(34,181,115,.3)}
.pc{background:rgba(61,142,232,.2);color:#7DB8F5;border:1px solid rgba(61,142,232,.3)}
.pr{background:rgba(212,146,10,.2);color:#F0B840;border:1px solid rgba(212,146,10,.3)}
.fnote{font-size:10px;color:var(--amber2);font-style:italic;padding:3px 0;line-height:1.45}
.empty-p{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:8px;opacity:.35}
.ab{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-radius:6px;border:1px solid var(--bdr);background:var(--navy3);color:var(--cream);font-family:var(--fb);font-size:11px;cursor:pointer;text-align:left;width:100%;margin-bottom:4px;gap:5px;transition:all .15s;-webkit-user-select:none;user-select:none;touch-action:manipulation}
.ab:active{background:var(--slate)}
.ab.afo{border-color:var(--amber);color:var(--amber2);background:var(--slate)}
.ab-ic{font-size:11px;opacity:.5;flex-shrink:0}
.af{display:none;background:var(--navy);border:1px solid var(--bdr);border-radius:5px;padding:9px;margin-bottom:4px}
.af.open{display:block}
.af label{display:block;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:2px;margin-top:6px}
.af label:first-child{margin-top:0}
.af input,.af textarea,.af select{width:100%;padding:6px 8px;border-radius:4px;border:1px solid var(--bdr);background:var(--navy2);color:var(--cream);font-family:var(--fb);font-size:12px;outline:none;-webkit-appearance:none}
.af input:focus,.af textarea:focus{border-color:var(--amber)}
.af textarea{resize:none}
.af select option{background:var(--navy2)}
.af-row{display:flex;gap:4px;margin-top:8px}
.af-btn{flex:1;padding:7px;border-radius:5px;border:1px solid var(--bdr);background:var(--navy3);color:var(--muted);font-family:var(--fb);font-size:11px;cursor:pointer;font-weight:500;-webkit-appearance:none;touch-action:manipulation}
.af-btn:active{opacity:.8}
.af-btn.pri{background:var(--amber);border-color:var(--amber);color:var(--navy);font-weight:700}
.af-btn.sav{background:var(--avail);border-color:var(--avail);color:#fff;font-weight:700}
.af-btn.sms{background:#1a5f9e;border-color:#1a5f9e;color:#fff;font-weight:700}
.sms-note{display:flex;align-items:center;gap:5px;font-size:9px;color:#7DB8F5;margin-top:5px;padding:4px 7px;background:rgba(61,142,232,.1);border-radius:4px;border:1px solid rgba(61,142,232,.2)}

/* ── PIN LOCK ─────────────────────────────────────── */
#pin-overlay{
  position:fixed;inset:0;z-index:9999;
  background:var(--navy);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:0;
}
#pin-overlay.hidden{display:none}
.pin-logo{font-family:var(--fd);font-weight:800;font-size:28px;color:var(--amber);letter-spacing:-1px;margin-bottom:4px}
.pin-subtitle{font-size:11px;color:var(--muted);margin-bottom:36px;letter-spacing:.05em}
.pin-dots{display:flex;gap:14px;margin-bottom:32px}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--muted);background:transparent;transition:all .15s}
.pin-dot.filled{background:var(--amber);border-color:var(--amber)}
.pin-dot.error{background:var(--sold);border-color:var(--sold)}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:240px}
.pin-key{
  height:64px;border-radius:12px;
  border:1px solid var(--bdr2);
  background:var(--navy2);
  color:var(--cream);font-family:var(--fd);
  font-size:22px;font-weight:600;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .1s;
  -webkit-tap-highlight-color:rgba(255,255,255,0.15);
  user-select:none;-webkit-user-select:none;
  touch-action:manipulation;
}
.pin-key:active{background:var(--slate);transform:scale(0.95)}
.pin-key.pin-del{font-size:16px;color:var(--muted)}
.pin-key.pin-zero{grid-column:2}
.pin-error-msg{font-size:11px;color:var(--sold);margin-top:16px;height:16px;letter-spacing:.03em}
</style>
</head>
<body>

<div id="pin-overlay">
  <div class="pin-logo">Oak Brook</div>
  <div class="pin-subtitle">SCHILLING CONSTRUCTION · CEDAR LAKE IN</div>
  <div class="pin-dots">
    <div class="pin-dot" id="d0"></div>
    <div class="pin-dot" id="d1"></div>
    <div class="pin-dot" id="d2"></div>

    <button class="pin-key" ontouchstart="PK('1')" onclick="PK('1')">1</button>

    <button class="pin-key" ontouchstart="PK('4')" onclick="PK('4')">4</button>
    <button class="pin-key" ontouchstart="PK('5')" onclick="PK('5')">5</button>
    <button class="pin-key" ontouchstart="PK('6')" onclick="PK('6')">6</button>
    <button class="pin-key" ontouchstart="PK('7')" onclick="PK('7')">7</button>

<div id="shell">

  <!-- LAYER TABS -->
  <div id="tabbar">
    <button class="tab" data-l="portfolio" onclick="SL('portfolio')"><span class="tdot" style="background:#8B5CF6"></span>Portfolio</button>
    <button class="tab on" data-l="sales" onclick="SL('sales')"><span class="tdot" style="background:var(--avail)"></span>Sales</button>
    <button class="tab" data-l="field" onclick="SL('field')"><span class="tdot" style="background:#F97316"></span>Field ops</button>
    <button class="tab" data-l="backoffice" onclick="SL('backoffice')"><span class="tdot" style="background:#EC4899"></span>Back office</button>
    <button class="tab" data-l="hoa" onclick="SL('hoa')"><span class="tdot" style="background:#0E9E9B"></span>HOA</button>
    <button class="tab" data-l="warranty" onclick="SL('warranty')"><span class="tdot" style="background:#9B27AF"></span>Warranty</button>
  </div>

  <!-- TOPBAR -->
  <div id="topbar">
    <div class="tb-l">
      <div class="tb-ttl">Creekside Drive</div>
      <div class="tb-sub">Oak Brook · Cedar Lake IN 46303 · Plat 19-272</div>
    </div>
    <div id="tb-badge"><div class="pulse"></div><span id="tb-lbl">Sales</span></div>
  </div>

  <!-- STAT CHIPS -->
  <div id="statrow">
    <span class="chip cg"><span id="tc-a">—</span> available</span>
    <span class="chip cr"><span id="tc-s">—</span> sold</span>

    <span class="chip ca"><span id="tc-r">—</span> reserved</span>

  <!-- MAP -->

      <button class="zbtn" onclick="zoom(1)" aria-label="Zoom in">+</button>
      <button class="zbtn" onclick="zoom(-1)" aria-label="Zoom out">−</button>

    </div>

      <div class="leg-t" id="leg-t">Sales</div>
      <div id="leg-i"></div>
    </div>

  </div>

<!-- DETAIL PANEL (bottom sheet) -->
  <div id="panel">
    <div id="ph">
      <div><div id="ph-lot">Select a lot</div><div id="ph-addr">Tap any marker on the map</div></div>
      <button id="ph-x" onclick="CP()">✕</button>
    </div>
    <div class="panel-scroll">
      <div id="pb"><div class="empty-p"><div style="font-size:26px;opacity:.4">⌖</div><div style="font-size:11px;color:var(--muted);text-align:center;line-height:1.6">Tap any lot marker<br>to view details</div></div></div>
      <div id="pa"></div>
    </div>

</div>

<script>
// ═══════════════════════════════════════════════════
// TILE MAP ENGINE — pure canvas, no Leaflet
// ═══════════════════════════════════════════════════
const TILE_URL = "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png";
const SUBS = ['a','b','c'];
let tileCache = {};

function getTileUrl(z, x, y) {
  const s = SUBS[(x + y + z) % 3];
  return TILE_URL.replace('{s}',s).replace('{z}',z).replace('{x}',x).replace('{y}',y);
}

// Geo <-> pixel conversions (Mercator)
function lon2x(lon, z) { return ((lon + 180) / 360) * Math.pow(2, z); }
function lat2y(lat, z) {
  const r = Math.PI / 180;
  return (1 - Math.log(Math.tan(lat * r) + 1 / Math.cos(lat * r)) / Math.PI) / 2 * Math.pow(2, z);
}
function x2lon(x, z) { return x / Math.pow(2, z) * 360 - 180; }
function y2lat(y, z) {
  const n = Math.PI - 2 * Math.PI * y / Math.pow(2, z);
  return 180 / Math.PI * Math.atan(0.5 * (Math.exp(n) - Math.exp(-n)));
}

// State
let cvs, ctx, W, H;
let camX, camY, camZ = 17; // tile zoom
let TILE_SIZE = 256;
let dragging = false, dragStartX, dragStartY, dragCamX, dragCamY;
let pinching = false, pinchDist0, pinchCamZ0, pinchCamX0, pinchCamY0;
let animFrame = null;
let dirty = true;

// Center on Oak Brook subdivision
const CENTER_LAT = 41.3879, CENTER_LON = -87.4672;

function initCanvas() {
  cvs = document.getElementById('mapcanvas');
  ctx = cvs.getContext('2d');
  resize();
  // Set initial camera
  camX = lon2x(CENTER_LON, camZ);
  camY = lat2y(CENTER_LAT, camZ);
  bindEvents();
  requestAnimationFrame(drawLoop);
}

function resize() {
  const wrap = document.getElementById('mapwrap');
  W = wrap.clientWidth;
  H = wrap.clientHeight;
  cvs.width = W * devicePixelRatio;
  cvs.height = H * devicePixelRatio;
  cvs.style.width = W + 'px';
  cvs.style.height = H + 'px';
  ctx.scale(devicePixelRatio, devicePixelRatio);
  dirty = true;
}

// Convert geo to canvas pixel
function geoToPixel(lat, lon) {
  const tx = lon2x(lon, camZ);
  const ty = lat2y(lat, camZ);
  return {
    x: (tx - camX) * TILE_SIZE + W / 2,
    y: (ty - camY) * TILE_SIZE + H / 2
  };
}

// Convert canvas pixel to geo
function pixelToGeo(px, py) {
  const tx = (px - W/2) / TILE_SIZE + camX;
  const ty = (py - H/2) / TILE_SIZE + camY;
  return { lat: y2lat(ty, camZ), lon: x2lon(tx, camZ) };
}

function drawLoop() {
  if (dirty) { drawMap(); dirty = false; }
  requestAnimationFrame(drawLoop);
}

function drawMap() {
  ctx.clearRect(0, 0, W, H);

  // Draw tiles
  const tileZoom = Math.round(camZ);
  const scale = Math.pow(2, camZ - tileZoom);
  const tSize = TILE_SIZE * scale;

  const tX0 = camX * Math.pow(2, tileZoom - camZ);
  const tY0 = camY * Math.pow(2, tileZoom - camZ);

  const startTX = Math.floor(tX0 - W / (2 * tSize));
  const endTX = Math.ceil(tX0 + W / (2 * tSize));
  const startTY = Math.floor(tY0 - H / (2 * tSize));
  const endTY = Math.ceil(tY0 + H / (2 * tSize));

  const maxTile = Math.pow(2, tileZoom) - 1;

  for (let tx = startTX; tx <= endTX; tx++) {
    for (let ty = startTY; ty <= endTY; ty++) {
      if (ty < 0 || ty > maxTile) continue;
      const wtx = ((tx % Math.pow(2, tileZoom)) + Math.pow(2, tileZoom)) % Math.pow(2, tileZoom);
      const px = (tx - tX0) * tSize + W / 2;
      const py = (ty - tY0) * tSize + H / 2;

      const key = `${tileZoom}/${wtx}/${ty}`;
      if (tileCache[key] && tileCache[key].complete) {
        ctx.drawImage(tileCache[key], px, py, tSize + 1, tSize + 1);
      } else if (!tileCache[key]) {
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.src = getTileUrl(tileZoom, wtx, ty);
        img.onload = () => { dirty = true; };
        tileCache[key] = img;
        // fill placeholder
        ctx.fillStyle = '#0a1520';
        ctx.fillRect(px, py, tSize + 1, tSize + 1);
      } else {
        ctx.fillStyle = '#0a1520';
        ctx.fillRect(px, py, tSize + 1, tSize + 1);
      }
    }
  }

  // Draw lot markers
  drawMarkers();
}

function drawMarkers() {
  const cfg = LCFG[CL];
  for (let n = 1; n <= 38; n++) {
    const l = INFO[n]; if (!l || !CO[n]) continue;
    const col = cfg.col(l);
    const pos = geoToPixel(CO[n][0], CO[n][1]);
    const sel = n === SEL;
    const r = sel ? 18 : 13;

    // Skip if off screen
    if (pos.x < -r*2 || pos.x > W+r*2 || pos.y < -r*2 || pos.y > H+r*2) continue;

    // Glow for selected
    if (sel) {
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, r + 4, 0, Math.PI * 2);
      ctx.fillStyle = col + '33';
      ctx.fill();
    }

    // Circle
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, r - (sel ? 1 : 0), 0, Math.PI * 2);
    ctx.fillStyle = col;
    ctx.globalAlpha = 0.9;
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.strokeStyle = sel ? 'rgba(255,255,255,0.9)' : 'rgba(255,255,255,0.6)';
    ctx.lineWidth = sel ? 2 : 1;
    ctx.stroke();

    // Label
    const fs = n >= 10 ? (sel ? 9 : 7.5) : (sel ? 10 : 8.5);
    ctx.fillStyle = '#ffffff';
    ctx.font = `700 ${fs}px Syne, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(String(n), pos.x, pos.y + 0.5);
  }
}

// ── ZOOM ──────────────────────────────────────────
function zoom(dir) {
  const newZ = Math.max(14, Math.min(20, camZ + dir * 0.8));
  // Scale camera position
  const ratio = Math.pow(2, newZ - camZ);
  camX *= ratio;
  camY *= ratio;

  if (Math.round(newZ) !== Math.round(camZ - dir * 0.8)) {

}

function fitAll() {
  camZ = 17;
  camX = lon2x(CENTER_LON, camZ);
  camY = lat2y(CENTER_LAT, camZ);

// ── HIT TEST ──────────────────────────────────────
function hitTest(px, py) {
  for (let n = 38; n >= 1; n--) {
    const l = INFO[n]; if (!l || !CO[n]) continue;
    const pos = geoToPixel(CO[n][0], CO[n][1]);
    const r = (n === SEL ? 18 : 13) + 6; // extra tap area
    const dx = px - pos.x, dy = py - pos.y;
    if (dx*dx + dy*dy <= r*r) return n;
  }
  return null;
}

// ── POINTER EVENTS ────────────────────────────────
function bindEvents() {
  // Touch
  cvs.addEventListener('touchstart', onTouchStart, {passive:false});
  cvs.addEventListener('touchmove', onTouchMove, {passive:false});
  cvs.addEventListener('touchend', onTouchEnd, {passive:false});
  // Mouse
  cvs.addEventListener('mousedown', onMouseDown);
  cvs.addEventListener('mousemove', onMouseMove);
  cvs.addEventListener('mouseup', onMouseUp);
  cvs.addEventListener('wheel', onWheel, {passive:false});
  // Resize
  window.addEventListener('resize', () => { resize(); dirty = true; });
}

let touchTapX, touchTapY, touchTapTime;

function onTouchStart(e) {
  e.preventDefault();
  if (e.touches.length === 1) {
    dragging = true;
    dragStartX = e.touches[0].clientX;
    dragStartY = e.touches[0].clientY;
    dragCamX = camX; dragCamY = camY;
    touchTapX = dragStartX; touchTapY = dragStartY;
    touchTapTime = Date.now();
    pinching = false;
  } else if (e.touches.length === 2) {
    dragging = false;
    pinching = true;
    const dx = e.touches[1].clientX - e.touches[0].clientX;
    const dy = e.touches[1].clientY - e.touches[0].clientY;
    pinchDist0 = Math.sqrt(dx*dx + dy*dy);
    pinchCamZ0 = camZ;
    pinchCamX0 = camX; pinchCamY0 = camY;
  }
}

function onTouchMove(e) {
  e.preventDefault();
  if (e.touches.length === 1 && dragging) {
    const dx = (e.touches[0].clientX - dragStartX) / TILE_SIZE;
    const dy = (e.touches[0].clientY - dragStartY) / TILE_SIZE;
    camX = dragCamX - dx;
    camY = dragCamY - dy;
    dirty = true;
  } else if (e.touches.length === 2 && pinching) {
    const dx = e.touches[1].clientX - e.touches[0].clientX;
    const dy = e.touches[1].clientY - e.touches[0].clientY;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const newZ = Math.max(14, Math.min(20, pinchCamZ0 + Math.log2(dist / pinchDist0)));
    const ratio = Math.pow(2, newZ - camZ);
    camX *= ratio; camY *= ratio;
    camZ = newZ;
    dirty = true;
  }
}

function onTouchEnd(e) {
  e.preventDefault();
  if (dragging && Date.now() - touchTapTime < 300) {
    // Check if it's a tap (not a drag)
    const moveDist = Math.abs(e.changedTouches[0].clientX - touchTapX) + Math.abs(e.changedTouches[0].clientY - touchTapY);
    if (moveDist < 12) {
      const rect = cvs.getBoundingClientRect();
      const px = e.changedTouches[0].clientX - rect.left;
      const py = e.changedTouches[0].clientY - rect.top;
      const hit = hitTest(px, py);
      if (hit) OP(hit);
    }
  }
  dragging = false; pinching = false;
}

function onMouseDown(e) {
  dragging = true;
  dragStartX = e.clientX; dragStartY = e.clientY;
  dragCamX = camX; dragCamY = camY;
  touchTapX = e.clientX; touchTapY = e.clientY;
  touchTapTime = Date.now();
}
function onMouseMove(e) {
  if (!dragging) return;
  const dx = (e.clientX - dragStartX) / TILE_SIZE;
  const dy = (e.clientY - dragStartY) / TILE_SIZE;
  camX = dragCamX - dx; camY = dragCamY - dy;
  dirty = true;
}
function onMouseUp(e) {
  if (dragging && Date.now() - touchTapTime < 250) {
    const moveDist = Math.abs(e.clientX - touchTapX) + Math.abs(e.clientY - touchTapY);
    if (moveDist < 8) {
      const rect = cvs.getBoundingClientRect();
      const hit = hitTest(e.clientX - rect.left, e.clientY - rect.top);
      if (hit) OP(hit);
    }
  }
  dragging = false;
}
function onWheel(e) {
  e.preventDefault();
  const newZ = Math.max(14, Math.min(20, camZ - e.deltaY * 0.002));
  const ratio = Math.pow(2, newZ - camZ);
  camX *= ratio; camY *= ratio;
  camZ = newZ;
  dirty = true;
}

  document.getElementById("ph-addr").textContent = "Tap any marker on the map";
  document.getElementById("pb").innerHTML = `<div class="empty-p"><div style="font-size:26px;opacity:.4">⌖</div><div style="font-size:11px;color:var(--muted);text-align:center;line-height:1.6">Tap any lot marker<br>to view details</div></div>`;
  document.getElementById("pa").innerHTML = "";
}

function RP(n) {
  const l=INFO[n]||{}, cx=CX[n]||{}, ow=OWN(n);
  const pc=PC[l.st]||"pa2", sl=SL2[l.st]||"—";
  const osec = (ow||cx.p||cx.e) ? `<div class="sec"><div class="sec-t">Owner</div>
    ${ow?`<div class="kv"><span>Name</span><span>${ow}</span></div>`:""}
    ${cx.p?`<div class="kv"><span>Phone</span><span>${cx.p}</span></div>`:""}
    ${cx.e?`<div class="kv"><span>Email</span><span style="font-size:10px">${cx.e}</span></div>`:""}
  </div>` : "";

  let body="", acts="";

  if (CL==="portfolio") {
    if (l.st!=="sold") { body=osec+`<div class="sec"><div class="sec-t">Portfolio</div><div class="fnote">Financial detail on closed lots only.</div></div>`; }
    else {
      const gp=(l.sp||0)-(l.cb||0), mg=(gp/l.sp*100).toFixed(1);
      body=osec+`<div class="sec"><div class="sec-t">Closed financials</div>
        <div class="kv"><span>Sale price</span><span>${$f(l.sp)}</span></div>
        <div class="kv"><span>Cost basis</span><span>${$f(l.cb)}</span></div>
        <div class="kv kv-g"><span>Gross profit</span><span>${$f(gp)}</span></div>
        <div class="kv kv-g"><span>Margin</span><span>${mg}%</span></div>
        <div class="kv"><span>Close date</span><span>${l.cl||"—"}</span></div>
      </div>`;
    }
    acts = AB("pfl","Portfolio P&L ↗",`FI('Draft full Oak Brook portfolio P&L executive summary for Schilling Construction')`);
  }
  else if (CL==="sales") {
    body=osec+`<div class="sec"><div class="sec-t">Lot & home</div>
      <div class="kv"><span>Status</span><span><span class="pill ${pc}">${sl}</span></span></div>
      <div class="kv"><span>List price</span><span>${$f(l.lp)}</span></div>
      <div class="kv"><span>Lot</span><span>${l.sf.toLocaleString()} SF · ${l.ac} ac</span></div>
      <div class="kv"><span>Home sqft</span><span>${l.hsf.toLocaleString()} SF</span></div>
      <div class="kv"><span>Beds/baths</span><span>${l.bd}bd/${l.ba}ba</span></div>
      <div class="kv"><span>Foundation</span><span>${l.fo}</span></div>
      <div class="kv"><span>Phase</span><span>${l.ph}</span></div>
      ${l.nt?`<div class="fnote">${l.nt}</div>`:""}
    </div>`;
    acts = AF(`sb${n}`,"Draft buyer info sheet",`<label>Buyer name</label><input id="bn${n}" value="${ow}"/><label>Notes</label><textarea id="bnt${n}" rows="2" placeholder="Customizations..."></textarea>`,`FI('Draft buyer info sheet for Lot ${n} at ${l.a}. Buyer: '+V('bn${n}')+'. Notes: '+V('bnt${n}'))`)
      + AB(`sp${n}`,"Home plans & options ↗",`FI('Home plans for Lot ${n} at ${l.a} — ${l.sf} SF, ${l.fo}')`);
  }
  else if (CL==="field") {
    body=`<div class="sec"><div class="sec-t">Field status</div>
      <div class="kv"><span>Permit</span><span>${l.pm}</span></div>
      <div class="kv"><span>Inspection</span><span>${l.ins}</span></div>
      <div class="kv"><span>Utilities</span><span>${l.ut}</span></div>
      <div class="kv"><span>Foundation</span><span>${l.fo}</span></div>
      <div class="kv"><span>Phase</span><span>${l.ph}</span></div>
      ${l.nt?`<div class="fnote">${l.nt}</div>`:""}
    </div>`;
    acts = AF(`fp${n}`,"Permit inquiry — Town of Cedar Lake",`<label>Permit type</label><input id="pt${n}" value="New single-family construction"/><label>Notes</label><textarea id="pn${n}" rows="2"></textarea>`,`FI('Draft permit inquiry to Town of Cedar Lake for Lot ${n} at ${l.a}. Type: '+V('pt${n}')+'. Notes: '+V('pn${n}'))`)
      + AF(`fs${n}`,"Message subcontractor",`<label>Subcontractor</label><input id="sn${n}" placeholder="e.g. ABC Plumbing"/><label>Message</label><textarea id="sm${n}" rows="2"></textarea>`,`FI('Draft message to '+V('sn${n}')+' for Lot ${n} at ${l.a}: '+V('sm${n}'))`);
  }
  else if (CL==="backoffice") {
    const ds={sold:"Closed",const:"In progress",reserved:"Pending",avail:"—"}[l.st]||"—";
    body=osec+`<div class="sec"><div class="sec-t">Deal status</div>
      <div class="kv"><span>Status</span><span><span class="pill ${pc}">${sl}</span></span></div>
      <div class="kv"><span>Deal</span><span>${ds}</span></div>
      <div class="kv"><span>Permit</span><span>${l.pm}</span></div>
      <div class="kv"><span>Phase</span><span>${l.ph}</span></div>
      ${l.cl?`<div class="kv"><span>Close date</span><span>${l.cl}</span></div>`:""}
      ${l.nt?`<div class="fnote">${l.nt}</div>`:""}
    </div>`;
    // Inspection → SMS on mobile
    const inspAct = `<button class="ab" id="abtn-fi${n}" onclick="TG('fi${n}')">Request inspection <span class="ab-ic">›</span></button>
      <div class="af" id="fi${n}">
        <label>Inspection type</label><input id="it${n}" placeholder="Framing, Rough-in, Final..." style="touch-action:manipulation"/>
        <label>Requested date</label><input id="id${n}" placeholder="e.g. May 20, 2026" style="touch-action:manipulation"/>
        <div class="af-row">
          <button class="af-btn" onclick="TG('fi${n}')" style="touch-action:manipulation">Cancel</button>
          <button class="af-btn pri" ontouchend="sendInspEmail(event,${n})" onclick="sendInspEmail(event,${n})" style="touch-action:manipulation">Send inspection request ✉️</button>
        </div>
      </div>`;
    acts = inspAct
      + AF(`fn${n}`,"Follow-up note",`<label>Note</label><textarea id="nt${n}" rows="3" placeholder="Action items..."></textarea>`,`alert('Note saved for Lot ${n}.')`,true)
      + AB(`fcs${n}`,"Check permit status ↗",`FI('Check permit status with Town of Cedar Lake for Lot ${n} at ${l.a} Cedar Lake IN 46303')`);
  }
  else if (CL==="hoa") {
    const mem = l.st==="sold"||l.st==="const";
    body=osec+`<div class="sec"><div class="sec-t">HOA membership</div>
      <div class="kv"><span>Address</span><span>${l.a}</span></div>
      <div class="kv"><span>Status</span><span>${mem?"Active member":"Pre-sale"}</span></div>
      <div class="kv"><span>Lot size</span><span>${l.sf.toLocaleString()} SF</span></div>
    </div>`;
    acts = AF(`ha${n}`,"Message all homeowners",`<label>Subject</label><input id="hs${n}" placeholder="e.g. Spring HOA Meeting"/><label>Message</label><textarea id="hm${n}" rows="3" placeholder="Dear Oak Brook homeowners..."></textarea>`,`FI('Draft HOA broadcast email to all Oak Brook homeowners Cedar Lake IN. Subject: '+V('hs${n}')+'. Message: '+V('hm${n}'))`)
      + AF(`hv${n}`,"Message vendor",`<label>Vendor</label><select id="hvn${n}"><option>Redwood Landscaping</option><option>Other vendor</option></select><label>Message</label><textarea id="hvm${n}" rows="2"></textarea>`,`FI('Draft message to '+EL2('hvn${n}')+' from Oak Brook HOA: '+V('hvm${n}'))`)
      + AF(`hsr${n}`,"Request for service",`<label>Service type</label><input id="hst${n}" placeholder="e.g. Landscaping, Snow removal..."/><label>Details</label><textarea id="hsd${n}" rows="2"></textarea>`,`FI('Draft HOA service request for Oak Brook Cedar Lake IN. Service: '+V('hst${n}')+'. Details: '+V('hsd${n}'))`);
  }
  else if (CL==="warranty") {
    body=osec+`<div class="sec"><div class="sec-t">Warranty info</div>
      <div class="kv"><span>Address</span><span>${l.a}</span></div>
      <div class="kv"><span>Home sqft</span><span>${l.hsf.toLocaleString()} SF</span></div>
      <div class="kv"><span>Foundation</span><span>${l.fo}</span></div>
      ${l.cl?`<div class="kv"><span>Close date</span><span>${l.cl}</span></div>`:""}
    </div>`;
    acts = AF(`wo${n}`,"Create work order",`<label>Issue / trade</label><input id="wi${n}" placeholder="e.g. HVAC, plumbing..."/><label>Description</label><textarea id="wd${n}" rows="2"></textarea><label>Priority</label><select id="wp${n}"><option>Normal</option><option>Urgent</option><option>Emergency</option></select>`,`FI('Create warranty work order for ${ow||l.a}, Lot ${n} at ${l.a}. Issue: '+V('wi${n}')+'. Desc: '+V('wd${n}')+'. Priority: '+EL2('wp${n}'))`)
      + AF(`wm${n}`,"Message subcontractor",`<label>Subcontractor</label><input id="wn${n}" placeholder="e.g. ABC Plumbing"/><label>Issue</label><textarea id="wms${n}" rows="2"></textarea>`,`FI('Draft warranty message to '+V('wn${n}')+' for Lot ${n} at ${l.a}, owner ${ow||"—"}: '+V('wms${n}'))`);
  }

  document.getElementById("pb").innerHTML = body || `<div class="empty-p"></div>`;
  document.getElementById("pa").innerHTML = acts;
}

function sendInspEmail(e, n) {
  if (e) e.preventDefault();
  const l=INFO[n]||{}, typ=V("it"+n)||"inspection", dt=V("id"+n);
  const subject="Inspection Request — Lot "+n+", "+l.a+", Oak Brook Cedar Lake IN 46303";
  const body="Hello,\n\nWe are requesting a "+typ+" inspection for:\n\nLot: "+n+"\nAddress: "+l.a+", Cedar Lake IN 46303"+(dt?"\nRequested date: "+dt:"")+"\n\nPlease confirm availability.\n\nThank you,\nSchilling Construction";
  window.location.href = "mailto:"+INSP_EMAIL+"?subject="+encodeURIComponent(subject)+"&body="+encodeURIComponent(body);
}

function AB(id, lbl, onclick) {
  return `<button class="ab" onclick="${onclick}">${lbl}<span class="ab-ic">›</span></button>`;
}
function AF(id, lbl, fields, action, save=false) {
  const fn = save ? `${action};TG('${id}')` : `${action}`;
  return `<button class="ab" id="abtn-${id}" onclick="TG('${id}')">${lbl}<span class="ab-ic">${save?"📝":"›"}</span></button>
  <div class="af" id="${id}">${fields}
    <div class="af-row">
      <button class="af-btn" onclick="TG('${id}')">Cancel</button>
      <button class="af-btn ${save?"sav":"pri"}" onclick="${fn}">${save?"Save":"Send to chat ↗"}</button>
    </div>
  </div>`;
}
function TG(id) {
  const f=document.getElementById(id); if(!f) return;
  const was=f.classList.contains("open");
  document.querySelectorAll(".af.open").forEach(x => {
    x.classList.remove("open");
    const b=document.getElementById("abtn-"+x.id); if(b) b.classList.remove("afo");
  });
  if (!was) {
    f.classList.add("open");
    const b=document.getElementById("abtn-"+id); if(b) b.classList.add("afo");
    setTimeout(() => { const i=f.querySelector("input,textarea,select"); if(i) i.focus(); }, 60);
  }
}

// Boot
updStats();
SL("sales");
// initCanvas called after PIN unlock
window.addEventListener("load", () => { /* waiting for PIN */ });
window.addEventListener("resize", () => { resize(); dirty=true; });

// ── PIN LOCK ─────────────────────────────────────
(function(){
  const CORRECT = '1644';
  let entry = '';
  let locked = true;

  // Keep shell hidden until unlocked
  document.getElementById('shell').style.visibility = 'hidden';

  let _lastPK = 0;
  window.PK = function(d) {
    if (!locked) return;
    // Debounce: touchstart fires before onclick - ignore duplicate within 300ms
    const now = Date.now();
    if (now - _lastPK < 300) return;
    _lastPK = now;
    if (entry.length >= 4) return;
    entry += d;
    updateDots();
    if (entry.length === 4) {
      setTimeout(() => checkPin(), 120);
    }
  };

  let _lastPD = 0;
  window.PD = function() {
    if (!locked) return;
    const now = Date.now();
    if (now - _lastPD < 300) return;
    _lastPD = now;
    entry = entry.slice(0, -1);
    updateDots();
    document.getElementById('pin-err').textContent = '';
    document.querySelectorAll('.pin-dot').forEach(d => d.classList.remove('error'));
  };

  function updateDots() {
    for (let i = 0; i < 4; i++) {
      document.getElementById('d'+i).classList.toggle('filled', i < entry.length);
    }
  }

  function checkPin() {
    if (entry === CORRECT) {
      // Unlock
      locked = false;
      document.getElementById('shell').style.visibility = 'visible';
      document.getElementById('pin-overlay').classList.add('hidden');
      // Init map after unlock
      setTimeout(initCanvas, 80);
    } else {
      // Wrong PIN — flash red, clear
      document.querySelectorAll('.pin-dot').forEach(d => {
        d.classList.remove('filled');
        d.classList.add('error');
      });
      document.getElementById('pin-err').textContent = 'Incorrect PIN';
      setTimeout(() => {
        document.querySelectorAll('.pin-dot').forEach(d => d.classList.remove('error'));
        document.getElementById('pin-err').textContent = '';
        entry = '';
      }, 800);
    }
  }
})();
